name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: "."
          ignore_paths: ".devcontainer"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make test scripts executable
        run: chmod +x tests/run_all.sh && find tests -name 'test_*.sh' -exec chmod +x {} +

      - name: Run tests
        run: ./tests/run_all.sh

  template-validation:
    name: Template Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check template files exist
        run: |
          files=(
            "Dockerfile.template"
            "docker-compose.yml.template"
            ".devcontainer/devcontainer.json.template"
            ".devcontainer/docker-compose.yml.template"
          )
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing template file: $file"
              exit 1
            fi
            echo "✓ Found: $file"
          done

      - name: Validate YAML templates
        run: |
          for file in docker-compose.yml.template .devcontainer/docker-compose.yml.template; do
            echo "Checking $file..."
            # Remove standalone placeholder lines, replace inline placeholders with dummy
            sed '/^[[:space:]]*{{[^}]*}}[[:space:]]*$/d; s/{{[^}]*}}/dummy/g' "$file" | python3 -c "import sys, yaml; yaml.safe_load(sys.stdin)" || {
              echo "❌ Invalid YAML: $file"
              exit 1
            }
            echo "✓ Valid: $file"
          done

      - name: Validate JSON templates
        run: |
          for file in .devcontainer/devcontainer.json.template; do
            echo "Checking $file..."
            # Check for basic JSON structure (template has variables so full validation isn't possible)
            if ! grep -q '"name"' "$file"; then
              echo "❌ Missing required field in: $file"
              exit 1
            fi
            echo "✓ Valid structure: $file"
          done

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [shellcheck, test, template-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create test workspace.toml
        run: |
          cat > workspace.toml << 'EOF'
          [container]
          service_name = "ci-test"
          username = "testuser"
          ubuntu_version = "24.04"

          [plugins]
          enable = ["docker-cli", "aws-cli", "aws-sam-cli", "github-cli"]

          [ports]
          forward = [3000]

          [vscode]
          extensions = ["ms-python.python"]
          EOF

      - name: Create test .env file
        run: |
          cat > .env << 'EOF'
          CONTAINER_SERVICE_NAME=ci-test
          USERNAME=testuser
          UID=1000
          GID=1000
          DOCKER_GID=999
          UBUNTU_VERSION=24.04
          FORWARD_PORT=3000
          EOF

      - name: Generate Dockerfile from template
        run: |
          # Load generator functions
          source lib/generators.sh

          # Generate Dockerfile using plugin-based pipeline
          generate_dockerfile_from_template \
            "Dockerfile.template" \
            "Dockerfile" \
            "workspace.toml"

      - name: Lint generated Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013,DL3059,DL3046,SC2016,DL4006,DL3004,SC2174,DL4001
          # DL3008: Pin versions in apt-get (dev environment uses latest)
          # DL3013: Pin versions in pip
          # DL3059: Multiple consecutive RUN (readability over layer optimization)
          # DL3046: useradd -l flag
          # SC2016: Single quotes (intentional)
          # DL4006: pipefail
          # DL3004: sudo usage (necessary for dev environment)
          # SC2174: mkdir -p with -m
          # DL4001: wget and curl both used (both needed)

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: workspace-docker-test:ci
          build-args: |
            UBUNTU_VERSION=24.04
            USERNAME=testuser
            UID=1000
            GID=1000
            DOCKER_GID=999
          cache-from: type=gha
          cache-to: type=gha,mode=max
