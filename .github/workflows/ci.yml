name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: "."
          ignore_paths: ".devcontainer"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --frozen

      - name: Make test scripts executable
        run: chmod +x tests/run_all.sh && find tests -name 'test_*.sh' -exec chmod +x {} +

      - name: Run tests
        run: ./tests/run_all.sh

  template-validation:
    name: Template Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required files exist
        run: |
          files=(
            "lib/generators.py"
          )
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing file: $file"
              exit 1
            fi
            echo "✓ Found: $file"
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Validate programmatic generators
        run: |
          echo "Checking generators.py can generate all targets..."
          # Create minimal workspace.toml for validation
          cat > /tmp/test-ws.toml << 'TOML'
          [container]
          service_name = "ci-test"
          username = "testuser"
          ubuntu_version = "24.04"
          [plugins]
          enable = ["docker-cli"]
          [ports]
          forward = [3000]
          TOML
          for cmd in compose devcontainer-json devcontainer-compose dockerfile; do
            uv run python3 lib/generators.py $cmd /tmp/test-ws.toml plugins > /dev/null || {
              echo "❌ generators.py $cmd failed"
              exit 1
            }
            echo "✓ generators.py $cmd OK"
          done

      - name: Validate JSON output
        run: |
          cat > /tmp/test-ws.toml << 'TOML'
          [container]
          service_name = "ci-test"
          username = "testuser"
          ubuntu_version = "24.04"
          [plugins]
          enable = []
          [ports]
          forward = [3000]
          TOML
          echo "Checking devcontainer.json validity..."
          uv run python3 lib/generators.py devcontainer-json /tmp/test-ws.toml plugins | \
            uv run python3 -c "import re, sys; data=re.sub(r'^\s*//.*$', '', sys.stdin.read(), flags=re.MULTILINE); import json; json.loads(data)" || {
              echo "❌ Invalid JSON output from generators.py"
              exit 1
            }
          echo "✓ Valid JSON output"

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [shellcheck, test, template-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Create test workspace.toml
        run: |
          cat > workspace.toml << 'EOF'
          [container]
          service_name = "ci-test"
          username = "testuser"
          ubuntu_version = "24.04"

          [plugins]
          enable = ["custom-ps1", "docker-cli", "aws-cli", "aws-sam-cli", "github-cli", "claude-code", "copilot-cli", "proto", "uv", "zig", "rust", "go", "lazygit", "starship"]

          [ports]
          forward = [3000]

          [vscode]
          extensions = ["ms-python.python"]
          EOF

      - name: Create test .env file
        run: |
          cat > .env << 'EOF'
          CONTAINER_SERVICE_NAME=ci-test
          USERNAME=testuser
          UID=1000
          GID=1000
          DOCKER_GID=999
          UBUNTU_VERSION=24.04
          FORWARD_PORT=3000
          EOF

      - name: Generate Dockerfile
        run: |
          # Load generator functions
          source lib/generators.sh

          # Generate Dockerfile using plugin-based pipeline
          generate_dockerfile_from_template \
            "Dockerfile" \
            "workspace.toml"

      - name: Lint generated Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013,DL3059,DL3046,SC2016,DL4006,DL3004,SC2174,DL4001
          # DL3008: Pin versions in apt-get (dev environment uses latest)
          # DL3013: Pin versions in pip
          # DL3059: Multiple consecutive RUN (readability over layer optimization)
          # DL3046: useradd -l flag
          # SC2016: Single quotes (intentional)
          # DL4006: pipefail
          # DL3004: sudo usage (necessary for dev environment)
          # SC2174: mkdir -p with -m
          # DL4001: wget and curl both used (both needed)

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: workspace-docker-test:ci
          build-args: |
            UBUNTU_VERSION=24.04
            USERNAME=testuser
            UID=1000
            GID=1000
            DOCKER_GID=999
          cache-from: type=gha
          cache-to: type=gha,mode=max
