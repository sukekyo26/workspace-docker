# Pre-commit configuration for workspace-docker
# See https://pre-commit.com for more information

repos:
  # ShellCheck for shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]
        files: \.(sh|bash)$
        exclude: ^\.devcontainer/

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Trim trailing whitespace
      - id: trailing-whitespace
        exclude: ^(\.devcontainer/|htmlcov/)
      # Ensure files end with newline
      - id: end-of-file-fixer
        exclude: ^(\.devcontainer/|htmlcov/)
      # Check YAML syntax
      - id: check-yaml
        args: ["--unsafe"]
      # Check for large files
      - id: check-added-large-files
        args: ["--maxkb=500"]
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check executable scripts have shebang
      - id: check-executables-have-shebangs
      # Check JSON syntax
      - id: check-json
        exclude: ^\.devcontainer/
      # Detect private keys
      - id: detect-private-key

  # Dockerfile linting with hadolint
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3013", "--ignore", "DL3059"]
        # DL3008: Pin versions in apt-get (intentionally using latest for dev env)
        # DL3013: Pin versions in pip install
        # DL3059: Multiple consecutive RUN (optimized for readability)

# CI configuration
ci:
  autofix_commit_msg: "style: auto-fix by pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  skip: [hadolint-docker]  # Skip in CI as it requires Docker
