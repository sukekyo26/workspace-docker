[metadata]
name = "Rust"
description = "Rust toolchain via rustup (cargo, clippy, rustfmt)"
default = false

[install]
requires_root = false
user_dirs = ["/home/${USERNAME}/.cargo", "/home/${USERNAME}/.rustup"]
dockerfile = '''
# Install Rust toolchain via rustup
RUN curl -fsSL --proto '=https' --tlsv1.2 https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --component clippy --component rustfmt && \
    echo '. "$HOME/.cargo/env"' >> ~/.bashrc
ENV PATH="/home/${USERNAME}/.cargo/bin:$PATH"
'''

volumes = ["/home/${USERNAME}/.cargo", "/home/${USERNAME}/.rustup"]

[version]
strategy = "latest"
