[metadata]
name = "AWS CLI v2"
description = "AWS Command Line Interface"
default = false

[install]
requires_root = false
dockerfile = '''
# Install AWS CLI v2
RUN ARCH="$(dpkg --print-architecture)" && \
    case "$ARCH" in \
        amd64) CLI_ARCH="x86_64" ;; \
        arm64) CLI_ARCH="aarch64" ;; \
        *) CLI_ARCH="x86_64" ;; \
    esac && \
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${CLI_ARCH}.zip" -o "awscliv2.zip" && \
    unzip awscliv2.zip && \
    sudo ./aws/install && \
    rm -rf aws awscliv2.zip && \
    mkdir -p ~/.aws
'''

[volumes]
aws = "/home/${USERNAME}/.aws"

[version]
strategy = "latest"
