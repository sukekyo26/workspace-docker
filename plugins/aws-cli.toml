[metadata]
name = "AWS CLI v2"
description = "AWS Command Line Interface"
default = false

[install]
requires_root = false
dockerfile = '''
# Install AWS CLI v2
RUN curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip" && \
    unzip awscliv2.zip && \
    sudo ./aws/install && \
    rm -rf aws awscliv2.zip && \
    mkdir -p ~/.aws
'''

[volumes]
aws = "/home/${USERNAME}/.aws"

[version]
strategy = "latest"
