[metadata]
name = "Zig"
description = "Zig programming language (required for cargo-lambda cross-compilation)"
default = false

[install]
requires_root = true
dockerfile = '''
# Install Zig (required for cargo-lambda cross-compilation)
RUN ARCH="$(dpkg --print-architecture)" && \
    case "$ARCH" in \
        amd64) DOWNLOAD_ARCH="x86_64" ; CHECKSUM="{{CHECKSUM_AMD64}}" ;; \
        arm64) DOWNLOAD_ARCH="aarch64" ; CHECKSUM="{{CHECKSUM_ARM64}}" ;; \
        *) DOWNLOAD_ARCH="x86_64" ; CHECKSUM="{{CHECKSUM_AMD64}}" ;; \
    esac && \
    echo "Detected architecture: $ARCH -> $DOWNLOAD_ARCH" && \
    curl -fsSL "https://ziglang.org/download/{{VERSION}}/zig-${DOWNLOAD_ARCH}-linux-{{VERSION}}.tar.xz" -o /tmp/zig.tar.xz && \
    echo "${CHECKSUM}  /tmp/zig.tar.xz" | sha256sum -c - && \
    mkdir -p /usr/local/zig && \
    tar -xf /tmp/zig.tar.xz -C /usr/local/zig --strip-components=1 && \
    ln -s /usr/local/zig/zig /usr/local/bin/zig && \
    rm /tmp/zig.tar.xz
'''

[version]
pin = "0.15.2"
checksum_amd64 = "02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239"
checksum_arm64 = "958ed7d1e00d0ea76590d27666efbf7a932281b3d7ba0c6b01b0ff26498f667f"
