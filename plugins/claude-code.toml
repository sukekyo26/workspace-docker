[metadata]
name = "Claude Code"
description = "Claude Code — AI-powered coding assistant by Anthropic"
default = false

[install]
requires_root = false
user_dirs = ["/home/${USERNAME}/.claude"]
dockerfile = '''
# Install Claude Code
RUN curl -fsSL --proto '=https' --tlsv1.2 https://claude.ai/install.sh | bash
'''

volumes = ["/home/${USERNAME}/.claude"]

[version]
strategy = "latest"
