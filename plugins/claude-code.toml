[metadata]
name = "Claude Code"
description = "Claude Code — AI-powered coding assistant by Anthropic"
default = false

[install]
requires_root = false
user_dirs = ["/home/${USERNAME}/.claude"]
dockerfile = '''
# Install Claude Code
RUN curl -fsSL --proto '=https' --tlsv1.2 https://claude.ai/install.sh -o /tmp/install-claude.sh && \
    echo "{{INSTALL_SCRIPT_SHA256}}  /tmp/install-claude.sh" | sha256sum -c - && \
    bash /tmp/install-claude.sh && \
    rm -f /tmp/install-claude.sh
'''

volumes = ["/home/${USERNAME}/.claude"]

[version]
strategy = "latest"
install_script_sha256 = "431889ac7d056f636aaf5b71524666d04c89c45560f80329940846479d484778"
