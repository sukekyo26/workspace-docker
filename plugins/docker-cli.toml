[metadata]
name = "Docker CLI"
description = "Docker CLI client for using host Docker daemon via socket mount"
default = true

[install]
requires_root = true
dockerfile = '''
# Install Docker CLI (client only, to use host Docker daemon via socket mount)
USER root
ARG DOCKER_GID
RUN mkdir -p /etc/apt/keyrings && \
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg && \
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list && \
    apt-get update && \
    apt-get install -y --no-install-recommends docker-ce-cli docker-compose-plugin && \
    apt-get clean && \
    rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/* && \
    groupadd -g ${DOCKER_GID} docker 2>/dev/null || groupmod -g ${DOCKER_GID} docker && \
    usermod -aG docker ${USERNAME}

USER ${USERNAME}
'''

[version]
strategy = "latest"
