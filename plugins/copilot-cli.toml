[metadata]
name = "GitHub Copilot CLI"
description = "GitHub Copilot in the CLI — AI-powered command-line assistant"
default = false

[install]
requires_root = false
user_dirs = ["/home/${USERNAME}/.copilot"]
dockerfile = '''
# Install GitHub Copilot CLI
RUN curl -fsSL --proto '=https' --tlsv1.2 https://gh.io/copilot-install | bash
'''

volumes = ["/home/${USERNAME}/.copilot"]

[version]
strategy = "latest"
